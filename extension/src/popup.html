<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anime Watched</title>
    <style>
      :root {
        --bg: #1b1b1f;
        --fg: #e8e8ea;
        --muted: #9a9aa2;
        --accent: #f47521; /* laranja Crunchyroll */
        --accent2: #2e51a2; /* azul AniList */
        --pv: #1399ff; /* azul Prime Video */
        --card: #26262b;
        --field: #16161a;
        --ok: #3fb950;
        --err: #f85149;
        --warn: #d29922;
      }
      * { box-sizing: border-box; }
      body {
        width: 380px;
        margin: 0;
        padding: 12px;
        font: 13px/1.45 system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: 0 0 auto; }
      .dot.on { background: var(--ok); }
      .card { background: var(--card); border-radius: 8px; padding: 10px; margin-bottom: 10px; }
      label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; }
      input[type="text"], select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #3a3a42;
        background: var(--field);
        color: var(--fg);
        font-size: 12px;
      }
      input.ep { width: 64px; text-align: center; }
      button, a.btn {
        border: 0; border-radius: 6px; padding: 7px 10px;
        font-size: 12px; font-weight: 600; cursor: pointer; color: #fff;
        text-decoration: none; display: inline-block; text-align: center;
      }
      .primary { background: var(--accent); }
      .mal { background: var(--accent2); }
      .ghost { background: #3a3a42; }
      .danger { background: var(--err); }
      .details { background: #8957e5; }
      .plan { background: #2ba9a1; }
      .pause { background: var(--warn); }
      button:disabled { opacity: 0.5; cursor: default; }
      .wide { width: 100%; }
      .row { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
      .row.tight { margin-top: 6px; }
      .grow { flex: 1; }
      .muted { color: var(--muted); font-size: 11px; }
      .mono { font-family: ui-monospace, monospace; font-size: 10px; word-break: break-all;
              background: var(--field); padding: 6px; border-radius: 6px; color: var(--muted); }
      .epline { font-weight: 600; font-size: 13px; }
      .epsub { color: var(--muted); font-size: 11px; }
      .candidate {
        padding: 6px; border-radius: 6px; background: var(--field); margin-top: 6px;
      }
      .candidate .banner {
        width: 100%; aspect-ratio: 3 / 1; object-fit: cover; border-radius: 4px;
        background: #333; display: block;
      }
      .candidate .meta { min-width: 0; margin-top: 6px; }
      .candidate .title { font-weight: 600; overflow-wrap: break-word; }
      .candidate .sub { color: var(--muted); font-size: 10px; overflow-wrap: break-word; }
      .candidate button { margin-top: 6px; width: 100%; padding: 5px 8px; }
      .target { margin-top: 8px; }
      .target .banner {
        width: 100%; aspect-ratio: 3 / 1; object-fit: cover; border-radius: 6px;
        background: #333; display: block;
      }
      .target .meta { margin-top: 6px; min-width: 0; }
      .warn { color: var(--warn); font-size: 11px; margin-top: 6px; }
      .links { margin-top: 8px; font-size: 11px; }
      .links a { color: var(--accent); cursor: pointer; text-decoration: none; }
      .links a:hover { text-decoration: underline; }
      .btnrow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
      .btnrow > button { padding: 5px 9px; font-size: 11px; }
      .mapcard { padding: 10px 0; border-top: 1px solid #33333a; }
      .mapcard:first-child { border-top: 0; }
      .mapcard .banner {
        width: 100%; aspect-ratio: 3 / 1; object-fit: cover; border-radius: 6px;
        background: #333; display: block;
      }
      .mapcard .info { margin-top: 8px; min-width: 0; }
      .mapcard .v { font-weight: 600; overflow-wrap: break-word; }
      .mapcard .subline { display: flex; justify-content: space-between; gap: 8px; margin-top: 2px; }
      .mapcard .k { font-family: ui-monospace, monospace; font-size: 10px; color: var(--muted);
        overflow-wrap: break-word; min-width: 0; }
      .mapcard .ep { font-size: 10px; color: var(--muted); flex: 0 0 auto; }
      .mapcard .actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
      .mapcard .actions > * { padding: 4px 9px; font-size: 11px; }
      .src { min-width: 44px; text-align: center; }
      .src.cr { background: var(--accent); }
      .src.pv { background: var(--pv); }
      .tabs { display: flex; gap: 0; margin-bottom: 8px; border-bottom: 1px solid #33333a; }
      .tabs button {
        flex: 1;
        background: transparent;
        color: var(--muted);
        border-radius: 0;
        padding: 6px 8px 8px;
        margin-bottom: -1px;
        border-bottom: 2px solid transparent;
      }
      .tabs button.active {
        color: var(--accent2);
        background: #34343c;
        border-radius: 6px 6px 0 0;
        border-bottom-color: var(--accent2);
        font-weight: 700;
      }
      .progressbar { height: 5px; border-radius: 3px; background: var(--field); margin-top: 6px; overflow: hidden; }
      .progressbar .fill { height: 100%; background: var(--ok); }
      .progressbar .fill.estimated { background: var(--warn); }
      .countdown { font-size: 10px; color: var(--warn); margin-top: 2px; }
      .countdown.available { color: var(--ok); font-weight: 600; }
      #msg { font-size: 11px; margin-top: 8px; min-height: 14px; }
      #msg.ok { color: var(--ok); }
      #msg.err { color: var(--err); }
      .hidden { display: none; }
      a.ext { color: var(--accent); }
    </style>
  </head>
  <body>
    <h1>
      <span id="statusDot" class="dot"></span> Anime Watched
      <span class="grow"></span>
      <button
        class="ghost hidden"
        id="resyncBtn"
        style="padding: 3px 7px; font-size: 12px"
        data-i18n-title="resyncBtnTitle"
      >
        ⟳
      </button>
      <button
        class="ghost"
        id="openSettings"
        style="padding: 3px 7px; font-size: 12px"
        data-i18n-title="settingsBtnTitle"
      >
        ⚙
      </button>
    </h1>

    <!-- SETUP (login no AniList) -->
    <div class="card hidden" id="setupCard">
      <label style="margin-top: 0" id="redirectLabel"></label>
      <div class="mono" id="redirectUri">—</div>
      <label style="margin-top: 8px" id="clientIdLabel_"></label>
      <input id="clientId" type="text" data-i18n-placeholder="setupClientIdPlaceholder" />
      <div class="row">
        <button class="ghost grow" id="saveCreds" data-i18n="setupSaveCredsBtn"></button>
        <button class="mal grow" id="loginBtn"></button>
      </div>
    </div>

    <!-- Estado 1 — busca (reaproveita HTML/CSS aqui; funções em popup.js
         decidem se o alvo é PLANNING ou CURRENT+episódio, ver docs/1.0.0/visao.md) -->
    <div class="card hidden" id="mainCard">
      <div class="epline" id="epTitle">—</div>
      <div class="epsub" id="epMeta">—</div>

      <div id="pickArea">
        <div class="row tight">
          <input id="searchQuery" class="grow" type="text" />
          <button class="ghost" id="searchBtn" data-i18n="searchBtn"></button>
        </div>
        <div id="candidates"></div>
        <label style="margin-top: 10px" id="pasteUrlLabel_"></label>
        <div class="row tight">
          <input id="malUrl" class="grow" type="text" data-i18n-placeholder="pasteUrlPlaceholder" />
          <button class="ghost" id="useUrlBtn" data-i18n="useBtn"></button>
        </div>
      </div>
    </div>

    <!-- Estado 2 — painel de lista (nenhuma página relevante) -->
    <div class="card hidden" id="panelCard">
      <div class="tabs">
        <button id="tabWatching" class="active" data-i18n="panelTabWatching"></button>
        <button id="tabPlanning" data-i18n="panelTabPlanning"></button>
      </div>
      <div class="muted" id="panelSyncInfo" style="margin-bottom: 6px"></div>
      <div id="panelList"><div class="muted" data-i18n="panelLoading"></div></div>
    </div>

    <!-- Estado 3 — tela de detalhes (anime já numa lista, sem episódio) -->
    <div class="card hidden" id="detailCard">
      <button class="ghost hidden" id="detailBack" style="padding: 4px 8px; margin-bottom: 6px" data-i18n="backBtn"></button>
      <div class="target">
        <img id="detailImg" class="banner" alt="" />
        <div class="meta">
          <div class="v" id="detailTitle" style="font-weight: 600"></div>
          <div class="epsub hidden" id="detailStatus"></div>
        </div>
      </div>
      <div class="row">
        <label style="margin: 0" data-i18n="epNumLabel"></label>
        <input id="detailProgress" class="ep" type="text" />
        <span class="muted" id="detailTotal"></span>
      </div>
      <div class="countdown hidden" id="detailCountdown"></div>
      <div class="warn hidden" id="detailWarn"></div>
      <div class="row" style="margin-top: 10px">
        <button class="primary grow" id="detailSaveBtn" data-i18n="detailSaveBtn"></button>
      </div>
      <div class="btnrow">
        <button class="plan" id="detailPlanBtn" data-i18n="planToWatchBtnLabel"></button>
        <button class="pause" id="detailPauseBtn" data-i18n="pauseBtn"></button>
        <button class="danger" id="detailDropBtn" data-i18n="dropBtn"></button>
      </div>
      <div class="btnrow">
        <button class="mal" id="detailAnilistBtn">AniList ↗</button>
        <button class="ghost hidden" id="detailSourceBtn"></button>
      </div>
    </div>

    <!-- Estado 4 — tela rápida (página de episódio, anime já reconhecido) -->
    <div class="card hidden" id="quickCard">
      <div class="target">
        <img id="quickImg" class="banner" alt="" />
        <div class="meta">
          <div class="v" id="quickTitle" style="font-weight: 600"></div>
          <div class="epsub" id="quickMeta"></div>
          <div class="epsub hidden" id="quickStatus"></div>
        </div>
      </div>
      <div class="row">
        <label style="margin: 0" data-i18n="epNumLabel"></label>
        <input id="quickEpNum" class="ep" type="text" />
        <span class="muted" id="quickTotal"></span>
      </div>
      <div class="warn hidden" id="quickWarn"></div>
      <div class="row" style="margin-top: 10px">
        <button class="primary grow" id="quickSaveBtn" data-i18n="detailSaveBtn"></button>
        <button class="details" id="quickDetailsBtn" data-i18n="viewDetailsBtn"></button>
      </div>
    </div>

    <div id="msg"></div>

    <script src="popup.js"></script>
  </body>
</html>
